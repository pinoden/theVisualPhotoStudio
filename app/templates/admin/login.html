<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login – The Visuals Photo Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:var(--color-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;">

  <div style="background:var(--color-ivory);padding:3rem;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.3);">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:var(--font-serif);font-size:1.3rem;color:var(--color-dark);">
        The Visuals <span style="color:var(--color-rose);">Photo Studio</span>
      </div>
      <h1 style="font-size:1.5rem;margin:.75rem 0 0;">Admin Login</h1>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" style="margin-bottom:1rem;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin.login') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-dark" style="width:100%;margin-top:.5rem;">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="{{ url_for('main.index') }}" style="font-size:.8rem;color:var(--color-muted);">← Back to website</a>
    </div>
  </div>

</body>
</html>
